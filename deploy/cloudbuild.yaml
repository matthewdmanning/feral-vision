steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build-base
    args: ['build', '-t', 'feral-segmentor:latest', '-f', 'deploy/Dockerfile', '.']

  - name: 'gcr.io/cloud-builders/docker'
    id: build-gcp
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/feral-segmentor-gcp:$SHORT_SHA'
      - -f
      - deploy/Dockerfile.gcp
      - .
    waitFor: ['build-base']

  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/feral-segmentor-gcp:$SHORT_SHA']
    waitFor: ['build-gcp']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-to-vm
    entrypoint: gcloud
    args:
      - compute
      - ssh
      - '${_VM_NAME}'
      - '--zone=${_VM_ZONE}'
      - >-
        --command=docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/feral-segmentor-gcp:$SHORT_SHA
        && docker run --gpus all --rm
        -e GCP_PROJECT=$PROJECT_ID
        -e GCS_BUCKET=${_GCS_BUCKET}
        ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/feral-segmentor-gcp:$SHORT_SHA
    waitFor: ['push']

substitutions:
  _REGION: us-central1
  _REPO: feral-segmentor
  _VM_NAME: feral-segmentor-trainer
  _VM_ZONE: us-central1-a
  _GCS_BUCKET: ''

options:
  logging: CLOUD_LOGGING_ONLY
