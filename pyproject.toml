[project]
name = "feral-segmentor"
version = "0.1.0"
description = "Image segmentor optimized to detect feral cats on mobile devices."
authors = [
    { name = "Matthew Manning", email = "mattmanningclemson@gmail.com" }
]
requires-python = ">=3.12,<3.14"
dependencies = [
    "dvc",
    "huggingface-hub>=1.20.1",
    "hydra-core",
    "mlflow",
    "omegaconf",
    "opencv-python>=4.13.0.92",
    "torch>=2.12.1",
    "pycocotools>=2.0",
    "ultralytics>=8.3",
]

[project.scripts]
feral-segmentor = "feral_segmentor:main"

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "coverage>=7.14.2",
    "pytest>=9.1.1",
    "pytest-cov>=7.1.0",
]
