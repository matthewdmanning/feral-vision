name: DVC Health

on:
  push:
    paths:
      - "dvc.yaml"
      - "dvc.lock"
      - ".dvcignore"
      - "**/*.dvc"
      - ".github/workflows/dvc-check.yml"
  pull_request:
    paths:
      - "dvc.yaml"
      - "dvc.lock"
      - ".dvcignore"
      - "**/*.dvc"
      - ".github/workflows/dvc-check.yml"

concurrency:
  group: dvc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dvc-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: DVC doctor
        run: uvx --from dvc --with dvc-s3 dvc doctor
      - name: DVC pipeline graph
        run: |
          if [ -f "dvc.yaml" ]; then
            uvx --from dvc --with dvc-s3 dvc dag
          fi
