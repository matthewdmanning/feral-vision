name: Prod

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Lint
        run: |
          uvx ruff check . --output-format=github
          uvx ruff format --check .
      - name: Install deps
        run: uv sync --group dev
      - name: Type check
        run: uv run mypy src
      - name: Tests
        run: uv run python -m pytest -m "not gpu and not slow" -q --tb=short

  build:
    name: Package build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv build

  docs-deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect builder
        id: detect
        run: |
          if [ -f "mkdocs.yml" ] || [ -f "mkdocs.yaml" ]; then
            echo "builder=mkdocs" >> "$GITHUB_OUTPUT"
          elif [ -f "docs/conf.py" ]; then
            echo "builder=sphinx" >> "$GITHUB_OUTPUT"
          else
            echo "builder=none" >> "$GITHUB_OUTPUT"
          fi
      - uses: astral-sh/setup-uv@v5
        if: steps.detect.outputs.builder != 'none'
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install deps
        if: steps.detect.outputs.builder != 'none'
        run: |
          if [ "${{ steps.detect.outputs.builder }}" = "sphinx" ]; then
            uv sync --group dev --group docs-sphinx
          else
            uv sync --group dev
          fi
      - name: Build sphinx docs
        if: steps.detect.outputs.builder == 'sphinx'
        run: uv run sphinx-build -b html docs docs/_build -W
      - name: Build mkdocs
        if: steps.detect.outputs.builder == 'mkdocs'
        run: uv run mkdocs build --strict
      - name: Set docs output path
        id: docs-path
        if: steps.detect.outputs.builder != 'none'
        run: |
          if [ "${{ steps.detect.outputs.builder }}" = "mkdocs" ]; then
            echo "path=site" >> "$GITHUB_OUTPUT"
          else
            echo "path=docs/_build" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload pages artifact
        if: steps.detect.outputs.builder != 'none'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.docs-path.outputs.path }}
      - name: Deploy to GitHub Pages
        if: steps.detect.outputs.builder != 'none'
        id: deploy
        uses: actions/deploy-pages@v4
