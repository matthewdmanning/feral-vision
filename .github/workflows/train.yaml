name: Train

on:
  push:
    branches: [main]
    paths:
      - "dvc.yaml"
      - "dvc.lock"
      - "**/*.dvc"
      - "conf/**"
      - "src/**"

permissions:
  contents: read

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync
      - run: uv run dvc repro
